<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <title>Flashcards!</title>
        <link rel="stylesheet" href="./client/etc/styles.css"/>
        <script src="./client/controllers/verbs.js" defer></script>
        <script src="./client/pages/common.js" defer></script>
        <script src="./client/pages/verbs.js" defer></script>
    </head>
    <body onload="load()">
        <h1><a id="h1-link" href="./index.html">Flashcards!</a> <button id="show-sidebar" onclick="toggleSidebar(true)">|||</button></h1>
        <div id="sidebar">
            <h2 style="display: none;">Sidebar menu</h2>
            <div id="sidebar-screen" onclick="toggleSidebar(false)"></div>
            <div id="sidebar-controls">
                <button id="close-sidebar" onclick="toggleSidebar(false)">&#10005;</button>
                <div id="sidebar-links">
                    <a class="sidebar-link" href="./index.html">Vocabulary</a>
                    <a id="verbs-link" class="sidebar-link active" href="./verbs.html">Verbs</a>
                    <a class="sidebar-link" href="./quiz.html">Quizzes</a>
                </div>
                <div id="settings">
                    <h3>App Settings</h3>
                    <h4>Flashcard mode</h4>
                    <div id="flashcardmode"></div>
                    <h4>Display mode</h4>
                    <div id="darkmode">
                        <button id="lightbutton" onclick="changeDarkMode(false)">Light mode</button>
                        <button id="darkbutton" onclick="changeDarkMode(true)">Dark mode</button>
                    </div>
                    <br/>
                </div>
                </div>
            </div>
        </div>
        <div id="wordlists">
            <h2>Verb Lists</h2>
            <div id="lists">
                <select id="list-dropdown" class=""></select>
                <span id="dropdown-chevron" class="">⌄</span>
            </div>
        </div>
        <div id="flashcards">
            <h2>List: <span id="flashtype"></span></h2>
            <div id="reviewmode">
                <button id="prev" onclick="changeCard(-1)">Previous</button>
                <button id="next" onclick="changeCard(1)">Next</button>
                &nbsp;
                <span id="status">0/0</span>&nbsp;&nbsp;
                <button id="random" onclick="changeCard(2)">Random</button>
                <br/><br/>
            </div>
            <div id="flashcard" onclick="showCardAnswer()">
                <span id="cardstatus"></span>
                <button id="savecard" onclick="saveCard(event)" style="display: none;">Save</button>
                <p id="hint">&nbsp;</p>
                <p id="answer">&nbsp;</p>
                <p id="tap">Tap / click card to reveal answer</p>
                <button id="main-audio" class='audio-button' onclick="speakTextOnCard(event)">&#128266;</button>
            </div>
            <div id="quizmode">
                <button id="didntknow" onclick="recordResult(false)">Don't know it</button>
                <button id="knewit" onclick="recordResult(true)">Know it!</button>
                <span>&nbsp;&nbsp;</span>
                <span id="quizstatus">Card 0/0</span>
            </div>
        </div>
    </body>
</html>
